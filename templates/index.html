<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador de Crachás</title>
<style>
body{font-family:Arial;background:#f3f4f6;margin:0}
.top{background:#0f8f43;color:white;padding:20px;display:flex;justify-content:space-between}
.top a{color:white;margin-left:10px;font-weight:bold;text-decoration:none}
.wrap{max-width:1200px;margin:30px auto;display:grid;grid-template-columns:400px 1fr;gap:20px}
.card{background:white;padding:24px;border-radius:16px;box-shadow:0 5px 20px #0002}
label{font-weight:bold;display:block;margin-top:16px}
input{width:100%;margin-top:6px}
input[type=range]{accent-color:#16a34a}
button{width:100%;padding:15px;margin-top:20px;border:0;border-radius:10px;background:#16a34a;color:white;font-weight:bold}
.preview{min-height:560px;display:grid;place-items:center;border:1px solid #ddd;border-radius:14px;background:#f9fafb}
.preview img{max-width:100%}
.links{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:15px}
.links a{text-align:center;background:#111827;color:white;text-decoration:none;padding:10px;border-radius:8px;font-weight:bold}
@media(max-width:900px){.wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="top">
<h2>Sistema de Crachás</h2>
<div><a href="/dashboard">Dashboard</a><a href="/scanner">Scanner</a><a href="/relatorio">Relatórios</a></div>
</div>
<div class="wrap">
<div class="card">
<h2>Gerar Crachás</h2>
<form action="/gerar" method="POST" enctype="multipart/form-data">
<label>Planilha Excel</label><input type="file" name="excel" id="excel" accept=".xlsx,.xls" required>
<label>PDF Modelo</label><input type="file" name="pdf" id="pdf" accept=".pdf" required>
<label>Posição X: <span id="xv">118</span></label><input type="range" min="0" max="700" value="118" name="pos_x" id="pos_x">
<label>Posição Y: <span id="yv">300</span></label><input type="range" min="0" max="700" value="300" name="pos_y" id="pos_y">
<label>Rotação: <span id="rv">90</span></label><input type="range" min="0" max="360" value="90" name="rotacao" id="rotacao">
<label>Fonte: <span id="fv">10</span></label><input type="range" min="6" max="30" value="10" name="fonte" id="fonte">
<button type="submit">GERAR PDF FINAL</button>
</form>
<p id="status" style="text-align:center;color:#666;font-weight:bold">Selecione a planilha e o PDF.</p>
<div class="links"><a href="/painel">Painel</a><a href="/scanner">Scanner</a><a href="/relatorio">Relatório</a></div>
</div>
<div class="card">
<h2>Pré-visualização</h2>
<div class="preview" id="preview">A pré-visualização aparecerá aqui.</div>
</div>
</div>
<script>
const excel=document.getElementById('excel'),pdf=document.getElementById('pdf');
const posX=document.getElementById('pos_x'),posY=document.getElementById('pos_y'),rot=document.getElementById('rotacao'),fonte=document.getElementById('fonte');
function vals(){xv.textContent=posX.value;yv.textContent=posY.value;rv.textContent=rot.value;fv.textContent=fonte.value}
async function preview(){
 vals();
 if(!excel.files.length||!pdf.files.length)return;
 status.textContent='Gerando pré-visualização...';
 let fd=new FormData();
 fd.append('excel',excel.files[0]);fd.append('pdf',pdf.files[0]);
 fd.append('pos_x',posX.value);fd.append('pos_y',posY.value);fd.append('rotacao',rot.value);fd.append('fonte',fonte.value);
 try{
  let r=await fetch('/preview',{method:'POST',body:fd});
  let d=await r.json();
  if(d.ok){document.getElementById('preview').innerHTML='<img src="'+d.imagem+'">';status.textContent='Atualizado';}
  else{document.getElementById('preview').innerHTML='Erro na pré-visualização:<br>'+d.erro;status.textContent='Erro na pré-visualização.';}
 }catch(e){document.getElementById('preview').innerHTML='Erro ao conectar com o servidor.'}
}
[excel,pdf,posX,posY,rot,fonte].forEach(e=>{e.addEventListener('change',preview);e.addEventListener('input',preview)});
vals();
</script>
</body>
</html>
